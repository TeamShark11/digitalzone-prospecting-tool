<!DOCTYPE html>
<html>
<head>
<title>Digitalzone Prospecting Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
margin:40px;
background:#f5f5f5;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
margin:auto;
}

button{
padding:10px 20px;
margin-top:10px;
}

textarea{
width:100%;
height:120px;
}

</style>
</head>

<body>

<div class="container">

<h2>Digitalzone Prospecting Tool</h2>

<p>Upload a CSV contact list and generate outreach drafts.</p>

<input type="file" id="csvFile">

<button onclick="processCSV()">Generate Outreach</button>

<h3>Output</h3>

<textarea id="output"></textarea>

</div>

<script>

function processCSV(){

const file = document.getElementById('csvFile').files[0];

if(!file){
alert("Upload CSV first");
return;
}

const reader = new FileReader();

reader.onload=function(e){

const text=e.target.result;
const lines=text.split("\n");

let output="";

for(let i=1;i<lines.length;i++){

const cols=lines[i].split(",");

const name=cols[0];
const company=cols[1];

if(!name) continue;

output+=`Hi ${name},

I wanted to reach out because we help enterprise teams like ${company} improve outreach by showing which contacts inside target accounts are actually engaging across channels.

Would it be useful to compare notes?

Best,
Martin

----------------

`;

}

document.getElementById("output").value=output;

}

reader.readAsText(file);

}

</script>

</body>
</html>
